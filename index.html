// ── Realtime 실시간 동기화 ─────────────────────────
function startRealtime(){
  if(!_sb)return;
  try{
    if(_realtimeChannel){
      try{_sb.removeChannel(_realtimeChannel);}catch(e){}
      _realtimeChannel=null;
    }
    _realtimeChannel=_sb
      .channel('clinic-rt-'+Date.now(),{config:{broadcast:{self:false}}})
      .on('postgres_changes',{event:'*',schema:'public',table:'patients'},handleRealtimeChange)
      .on('postgres_changes',{event:'*',schema:'public',table:'ledger_rows'},handleRealtimeChange)
      .on('postgres_changes',{event:'*',schema:'public',table:'happycalls'},handleRealtimeChange)
      .on('postgres_changes',{event:'*',schema:'public',table:'inpatients'},handleRealtimeChange)
      .on('postgres_changes',{event:'*',schema:'public',table:'schedule'},handleRealtimeChange)
      .subscribe(function(status){
        var el=document.querySelector('.sb-sync-time');
        if(status==='SUBSCRIBED'){
          if(el)el.textContent='실시간 🟢';
        } else {
          if(el)el.textContent='오프라인';
        }
      });
  }catch(e){
    console.warn('Realtime 시작 실패(무시):',e.message);
  }
}

// 다른 기기에서 변경이 감지되면 호출
var _myChanges=new Set(); // 내가 저장한 ID는 무시
function handleRealtimeChange(payload){
  // 내가 방금 저장한 데이터는 무시 (중복 로드 방지)
  var newId=payload.new&&payload.new.id;
  if(newId&&_myChanges.has(newId)){
    _myChanges.delete(newId);
    return;
  }
  console.log('🔄 다른 기기에서 변경 감지:', payload.table, payload.eventType);
  // 디바운스: 500ms 내 여러 변경은 한번만 처리
  if(_reloadTimer) clearTimeout(_reloadTimer);
  _reloadTimer=setTimeout(function(){
    sbLoadAll().then(function(){
      render();
      // 토스트 알림 (너무 자주 뜨지 않도록)
      var el=document.querySelector('.sb-sync-time');
      if(el){
        el.textContent='방금 동기화됨 ✓';
        setTimeout(function(){if(el)el.textContent='실시간 동기화 중 🔴';},2000);
      }
    });
    _reloadTimer=null;
  }, 500);
}

// save() 할 때 내 변경 ID 기록 (Realtime 중복 방지)
function markMyChange(data){
  if(!data)return;
  var rows=Array.isArray(data)?data:[data];
  rows.forEach(function(r){if(r&&r.id)_myChanges.add(r.id);});
  // 5초 후 자동 삭제
  setTimeout(function(){
    rows.forEach(function(r){if(r&&r.id)_myChanges.delete(r.id);});
  },5000);
}

// 전체 patients 페이지네이션 로드 (1000명 초과 대응)
async function loadAllPatients(){
  const PAGE=1000;
  let all=[];
  let from=0;
  while(true){
    const{data,error}=await _sb.from('patients').select('*').range(from,from+PAGE-1);
    if(error){console.error('patients 로드 오류:',error);break;}
    if(!data||data.length===0) break;
    all=all.concat(data);
    if(data.length<PAGE) break; // 마지막 페이지
    from+=PAGE;
  }
  return all;
}

// 전체 ledger_rows 페이지네이션 로드 (한도 없음)

  while(true){

      const rows=S.patients.map(ptToRow);
      const BATCH=200; // 200명씩
      const PARALLEL=5; // 5개 동시
      const batches=[];
      for(let i=0;i<rows.length;i+=BATCH) batches.push(rows.slice(i,i+BATCH));
      for(let i=0;i<batches.length;i+=PARALLEL){
        const group=batches.slice(i,i+PARALLEL);
        await Promise.all(group.map(async(batch,gi)=>{
          for(let retry=0;retry<4;retry++){
            try{
              const{error}=await _sb.from('patients').upsert(batch,{onConflict:'id',ignoreDuplicates:false});
              if(!error) return;
              if(error.code==='23505'||error.message?.includes('duplicate')) return; // 중복 무시
              console.warn('배치'+(i+gi)+' 재시도'+(retry+1),error.message);
              await new Promise(r=>setTimeout(r,300*(retry+1)));
            }catch(e){ await new Promise(r=>setTimeout(r,300*(retry+1))); }
          }
        }));
        if(i+PARALLEL<batches.length) await new Promise(r=>setTimeout(r,100));
      }
    }
    else if(key==='ledger'||key.startsWith('ledger:')){
      const targetDate=key.startsWith('ledger:')?key.slice(7):null;
      const rows=[];
      Object.entries(S.ledger).forEach(([date,rs])=>{
        if(targetDate&&date!==targetDate)return;
        rs.forEach(r=>rows.push(ledRowToSB(r,date)));
      });
      if(!rows.length){console.log('ledger: 저장할 행 없음');return;}
      console.log('ledger 저장 시작:', rows.length+'행'+(targetDate?' ('+targetDate+')':''));
      const BATCH=100;
      for(let i=0;i<rows.length;i+=BATCH){
        const batch=rows.slice(i,i+BATCH);
        let ok=false;
        for(let retry=0;retry<3;retry++){
          const{error}=await _sb.from('ledger_rows').upsert(batch,{onConflict:'id'});
          if(!error){ok=true;break;}
          console.warn('ledger 재시도'+(retry+1)+' 오류:', error.code, error.message);
          await new Promise(r=>setTimeout(r,500*(retry+1)));
        }
        if(ok) console.log('ledger 저장 완료:', batch.length+'행');
        else console.error('ledger 저장 최종 실패:', batch.length+'행');
      }
    }
    else if(key==='employees'){
      if(!S.employees.length)return;
      const{error}=await _sb.from('employees').upsert(S.employees.map(n=>({name:n})),{onConflict:'name',ignoreDuplicates:true});
      if(error)console.error('employees 오류:',error);
    }
    else if(key==='schedule'){
      const rows=[];
      Object.entries(S.schedule).forEach(([date,emps])=>
        Object.entries(emps).forEach(([emp,shift])=>{
          if(shift) rows.push({
            id: date+'_'+emp.replace(/[^a-zA-Z0-9가-힣]/g,'_'),
            date,
            employee_name:emp,
            shift
          });
        })
      );
      if(!rows.length)return;
      // id 기준 upsert (더 안전)
      const{error}=await _sb.from('schedule').upsert(rows,{onConflict:'id'});
      if(error){
        console.error('schedule 오류:', JSON.stringify(error));
        // fallback: 개별 저장
        for(const row of rows){
          const{error:e2}=await _sb.from('schedule').upsert([row],{onConflict:'id'});
          if(e2) console.warn('schedule 개별 저장 실패:', row.id, JSON.stringify(e2));
        }
      }
    }
    else if(key==='messageLogs'){
      if(!S.messageLogs.length)return;
      const rows=S.messageLogs.map(l=>({id:l.id,created_at_kr:l.createdAt||'',patient_name:l.patientName||'',to_number:l.to||'',type:l.type||'',status:l.status||'',text:l.text||''}));
      const{error}=await _sb.from('message_logs').upsert(rows,{onConflict:'id'});
      if(error)console.error('messageLogs 오류:',error);
    }
    else if(key==='inpatients'){
      const rows=[];
      Object.entries(S.inpatients).forEach(([date,rooms])=>Object.entries(rooms).forEach(([roomId,beds])=>beds.forEach((b,bi)=>{if(b)rows.push(inpToSB(date,roomId,bi,b));})));
      if(!rows.length)return;
      const{error}=await _sb.from('inpatients').upsert(rows,{onConflict:'id'});
      if(error)console.error('inpatients 오류:',error);
    }
    else if(key==='happycalls'){
      const rows=[];
      Object.entries(S.happycalls||{}).forEach(([,hcs])=>hcs.forEach(h=>rows.push(hcToSB(h))));
      if(!rows.length)return;
      const{error}=await _sb.from('happycalls').upsert(rows,{onConflict:'id'});
      if(error)console.error('happycalls 오류:',error);
    }

  }catch(e){
    _isSaving=false; // 오류 시도 플래그 해제
    console.error('sbSave 오류:',key,e);
    throw e;
  }finally{
    // 저장 완료 후 3초 뒤 Realtime 재개 (Supabase 전파 대기)
    setTimeout(function(){_isSaving=false;},3000);
  }
}

// 연결 테스트
async function testSupabaseConnection(){
  // DOM에서 직접 최신 값 읽어오기 (oninput이 씹혔을 경우 대비)
  const urlEl=document.querySelector('input[placeholder*="supabase.co"]');
  const keyEl=document.querySelector('input[placeholder*="eyJhbGci"]');
  if(urlEl&&urlEl.value.trim()) S.supabaseUrl=urlEl.value.trim();
  if(keyEl&&keyEl.value.trim()) S.supabaseKey=keyEl.value.trim();

  if(!S.supabaseUrl||!S.supabaseKey){
    showToast('URL과 Key를 먼저 입력해주세요','err');return;
  }
  if(!initSupabaseClient()){showToast('연결 초기화 실패 - URL/Key를 확인해주세요','err');return;}
  showToast('연결 테스트 중...');
  try{
    const{data,error}=await _sb.from('patients').select('id').limit(1);
    if(error){
      if(error.code==='42P01'){showToast('테이블이 없습니다. SQL 스키마를 먼저 실행해주세요','err');}
      else{showToast('연결 실패: '+error.message,'err');}
      S.sbConnected=false;
    }else{
      S.sbConnected=true;
      save('supabaseUrl');save('supabaseKey');
      showToast('✅ Supabase 연결 성공! 데이터 불러오는 중...');
      await sbLoadAll();
      render();
    }
  }catch(e){
    showToast('연결 오류: '+e.message,'err');
    S.sbConnected=false;
  }
  render();
}

const SB_KEYS=['patients','ledger','employees','schedule','messageLogs','inpatients','happycalls'];

function save(key){
  // 1. localStorage (오프라인 백업)
  try{
    localStorage.setItem('kh365_'+key,JSON.stringify(S[key]));
    localStorage.setItem('kh365__lastSaved',new Date().toLocaleString('ko-KR'));
  }catch(e){ console.error('localStorage 저장 오류:',key,e); }

  // 2. Supabase 우선 저장 (연결된 경우)
  if(_sb && S.sbConnected && SB_KEYS.includes(key)){
    sbSave(key).then(()=>{
      const el=document.querySelector('.sb-sync-time');
      if(el) el.textContent='✅ 저장됨';
    }).catch(e=>{
      console.error('Supabase 저장 오류:',key,e);
      // Supabase 실패해도 localStorage에는 저장됐으므로 조용히
    });
  }
}

window.updLedgerAC=function(d, rowId, val){

  row.chartNumber=val;

  // 2. 정확히 일치하는 환자가 있으면 즉시 자동입력
  const exactPt=S.patients.find(p=>p.chartNumber===val.trim());
  if(exactPt){
    row.patientName=exactPt.name;
    if(!row.category&&exactPt.visitType) row.category=exactPt.visitType;
    saveLedger(d,rows);
    // DOM 즉시 반영
    const nameInp=document.querySelector(`input[data-row-id="${rowId}"][data-field="patientName"]`);

    // 드롭다운 닫기
    const acEl=document.getElementById('ac_'+rowId);
    if(acEl){acEl.innerHTML='';acEl.style.display='none';}
    return;
  }
  saveLedger(d,rows);

  // 3. 부분 일치 → 드롭다운 표시
  const acEl=document.getElementById('ac_'+rowId);
  if(!acEl)return;
  if(!val||val.length<1){acEl.innerHTML='';acEl.style.display='none';return;}
  const results=searchPt(val);
  if(!results.length){acEl.innerHTML='';acEl.style.display='none';return;}

    const chart=p.chartNumber.replace(/'/g,"\'").replace(/"/g,'&quot;');
    const name=p.name.replace(/'/g,"\'").replace(/"/g,'&quot;');
    const phone=(p.phone||'').replace(/'/g,"\'");

      <div class="ac-sub">${p.phone||'번호없음'} · <span style="color:#2563eb">${p.visitType||''}</span></div>

function getWeekRanges(ym){
  var parts=ym.split('-');
  var y=parseInt(parts[0]),m=parseInt(parts[1]);
  var daysInMonth=new Date(y,m,0).getDate();
  var weeks=[
    {label:'1주',start:ym+'-01',end:ym+'-07'},
    {label:'2주',start:ym+'-08',end:ym+'-14'},
    {label:'3주',start:ym+'-15',end:ym+'-21'},
    {label:'4주',start:ym+'-22',end:ym+'-28'},
  ];
  if(daysInMonth>28) weeks.push({label:'5주',start:ym+'-29',end:ym+'-'+String(daysInMonth).padStart(2,'0')});
  return weeks;
}
function getWeekData(wk){
  var all=[];
  Object.entries(S.happycalls||{}).forEach(function(e){
    var k=e[0],v=e[1];
    if(k>=wk.start&&k<=wk.end) all=all.concat(v);
  });
  return all;
}

window.saveQuickAppts=async function(){
  if(!S.quickAppts||!S.quickAppts.length) return;
  const today=todayStr();
  const valid=S.quickAppts.filter(r=>r.patientName||r.chartNumber);
  if(!valid.length){showToast('입력된 예약이 없습니다','err');return;}

  // 예약날짜별로 그룹핑 → 해당 날짜 일계표에 각각 저장
  const byDate={};
  valid.forEach(r=>{
    const targetDate=r.appointmentDate||today;
    if(!byDate[targetDate]) byDate[targetDate]=[];
    byDate[targetDate].push(r);
  });

  const savedRows=[];
  Object.entries(byDate).forEach(([targetDate,rows])=>{
    const existing=getLedger(targetDate);
    const newRows=rows.map(r=>({
      ...newLedgerRow(),
      id:uid(),
      chartNumber:r.chartNumber||'',
      patientName:r.patientName||'',
      appointmentTime:r.appointmentTime||'',
      appointmentDate:targetDate,
      guidanceType:r.guidanceType||'',
      category:r.category||'재진',
      memo:r.memo||''
    }));
    saveLedger(targetDate, [...existing, ...newRows]);
    savedRows.push(...newRows);
  });

  // 저장 완료 후 기록으로 남기기 (savedAt 추가)
  if(!S.quickApptsHistory) S.quickApptsHistory=[];
  savedRows.forEach(r=>{
    S.quickApptsHistory.unshift({
      ...r,
      savedAt:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})
    });
  });
  // 최근 20건만 유지
  if(S.quickApptsHistory.length>20) S.quickApptsHistory=S.quickApptsHistory.slice(0,20);

  S.quickAppts=[];
  const dates=[...new Set(savedRows.map(r=>r.appointmentDate))].join(', ');
  showToast('✅ '+savedRows.length+'건 저장 완료! → '+dates+' 일계표');
  render();
};

window.ptUpdateTable=function(){
  // 테이블 tbody만 다시 렌더링 (포커스 유지)
  const tbody=document.getElementById('pt-tbody');
  const pageInfo=document.getElementById('pt-page-info');
  const pageNav=document.getElementById('pt-page-nav');
  const countSpan=document.getElementById('pt-count');
  if(!tbody) return render(); // tbody 없으면 전체 render

  const q=S.searchQ.toLowerCase();
  const sortKey=S.ptSortKey||'chart';
  const sortDir=S.ptSortDir||'asc';
  const sorted=[...S.patients].sort((a,b)=>{
    let cmp=0;
    if(sortKey==='chart'){
      const na=parseInt(a.chartNumber)||0, nb=parseInt(b.chartNumber)||0;
      cmp=(na!==nb)?(na-nb):(a.chartNumber||'').localeCompare(b.chartNumber||'');
    } else cmp=(a.name||'').localeCompare(b.name||'','ko');
    return sortDir==='asc'?cmp:-cmp;
  });
  const filtered=q?sorted.filter(p=>p.name.toLowerCase().includes(q)||p.chartNumber.toLowerCase().includes(q)||(p.phone||'').includes(q)):sorted;
  const PAGE_SIZE=100;
  const totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  if(S.ptPage>totalPages) S.ptPage=totalPages;
  const pageStart=(S.ptPage-1)*PAGE_SIZE;
  const paginated=filtered.slice(pageStart,pageStart+PAGE_SIZE);

  // tbody 업데이트
  tbody.innerHTML=paginated.map(p=>`<tr style="${S.ptSelected.has(p.id)?'background:#faf5ff;':''}">
    ${S.ptSelectMode?`<td style="width:36px;text-align:center"><input type="checkbox" ${S.ptSelected.has(p.id)?'checked':''} onchange="if(this.checked)S.ptSelected.add('${p.id}');else S.ptSelected.delete('${p.id}');ptUpdateTable()"></td>`:''}
    <td style="font-family:monospace;font-size:12px;color:#6b7280">${p.chartNumber||'-'}</td>
    <td style="font-weight:600">${p.name||'-'}</td>
    <td style="font-size:12px">${p.gender||'-'}</td>
    <td><span style="font-family:monospace;font-size:12px">${p.phone||'-'}</span>${p.phone?` <a href="tel:${p.phone}" style="color:#2563eb;font-size:11px;border:1px solid #93c5fd;padding:1px 7px;border-radius:4px;background:#eff6ff;text-decoration:none">📞</a>`:''}</td>
    <td>${p.visitType?`<span class="badge badge-blue">${p.visitType}</span>`:'-'}</td>
    <td style="font-size:12px;color:#6b7280">${p.referralPath||'-'}</td>
    <td><div style="display:flex;flex-wrap:wrap;gap:2px">${(p.treatmentArea||[]).slice(0,2).map(t=>`<span class="badge badge-gray" style="font-size:10px;padding:1px 5px">${t}</span>`).join('')}${(p.treatmentArea||[]).length>2?`<span style="font-size:10px;color:#9ca3af">+${(p.treatmentArea||[]).length-2}</span>`:''}</div></td>
    <td style="font-size:12px;color:#6b7280">${p.createdAt?p.createdAt.slice(0,10):'-'}</td>
    <td><div style="display:flex;gap:4px">
      <button class="btn btn-sm" onclick="editPt('${p.id}')">수정</button>
      <button class="btn btn-sm btn-danger" onclick="delPt('${p.id}')">삭제</button>
    </div></td>
  </tr>`).join('')||'<tr><td colspan="10"><div class="no-data">검색 결과 없음</div></td></tr>';

  // 카운트 업데이트
  if(countSpan) countSpan.textContent='전체 '+S.patients.length+'명'+(q?' → '+filtered.length+'명 검색됨':'');

  // 페이지 네비 업데이트
  if(pageNav){
    pageNav.style.display=totalPages>1?'flex':'none';
    if(pageInfo) pageInfo.textContent=S.ptPage+' / '+totalPages+' 페이지 ('+(pageStart+1)+'~'+Math.min(pageStart+PAGE_SIZE,filtered.length)+'번째)';
    // 버튼 disabled 상태
    const btns=pageNav.querySelectorAll('button');
    if(btns[0]) btns[0].disabled=S.ptPage<=1;
    if(btns[1]) btns[1].disabled=S.ptPage<=1;
    if(btns[2]) btns[2].disabled=S.ptPage>=totalPages;
    if(btns[3]) btns[3].disabled=S.ptPage>=totalPages;
  }

  // 검색창 포커스 유지
  const inp=document.getElementById('pt-search-inp');
  if(inp && document.activeElement!==inp){
    // 포커스가 다른 곳에 있으면 복원 안 함
  }
};

// ── 엑셀 iOS 호환 다운로드 ─────────────────────────────
function xlsxDownload(wb,filename){
  try{
    // iOS Safari는 XLSX.writeFile 안됨 → Blob URL 방식 사용
    const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
    const blob=new Blob([wbout],{type:'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},300);
  }catch(e){
    // 최후 fallback
    try{XLSX.writeFile(wb,filename);}catch(e2){showToast('다운로드 실패: '+e2.message,'err');}
  }
}

function renderDashboard(){
  const td=S.ledgerDate;

  const rows=getLedger(td);
  const allPt=S.patients;
  // 오늘 예약 = 실제 오늘 기준 (td가 아닌 realToday)

  const todayAppts=(()=>{
    const all=[];
    Object.entries(S.ledger).forEach(([ledgerDate,dayRows])=>{
      (dayRows||[]).forEach(r=>{
        if(r.appointmentDate===td) all.push({...r, ledgerDate});
      });
    });
    return all.sort((a,b)=>(a.appointmentTime||'').localeCompare(b.appointmentTime||''));
  })();
  // 내일 예약 = 항상 실제 오늘+1 (보고서 날짜 무관)
  const tmrDate=addDays(td,1); // 보고서 날짜 기준 다음날
  const tmrAppts=(()=>{
    const all=[];

    });
    return all.sort((a,b)=>(a.appointmentTime||'').localeCompare(b.appointmentTime||''));

  // 오늘 날짜 기준 전체 일계표에서 신환/TA 집계
  const allTodayRows=(()=>{
    const all=[];

  })();

    const total=cash+tr2+card;

  // S.modal 유지하면서 re-render (팝업 안에서 클릭해도 팝업 유지)
  render();
};
window.updMemo=(d,id,v)=>{saveLedger(d,getLedger(d).map(r=>r.id===id?{...r,memo:v}:r))};

  const d=S.ledgerDate;
  const rows=getLedger(d);
  const cash=rows.reduce((s,r)=>s+(+r.cashAmount||0),0);
  const transfer=rows.reduce((s,r)=>s+(+r.transferAmount||0),0);
  const card=rows.reduce((s,r)=>s+(+r.cardAmount||0),0);

  function buildRow(r,idx){
    const _rowBg={'재진':'#cbd5e1','신환':'#fde047','ta':'#67e8f9','ta초진':'#67e8f9','ta일반':'#67e8f9','ta추나':'#67e8f9','6개월재초진':'#fb923c'}[r.category]||'';
    return`<tr id="lr_${r.id}" style="${_rowBg?'background:'+_rowBg+';':''}">
      <td style="text-align:center;font-size:12px;color:#9ca3af;width:36px">${idx+1}</td>
      <td style="width:90px;position:relative">
        <div class="ac-wrap">
          <input class="tci" style="font-family:monospace;min-width:75px" placeholder="차트번호"
            data-row-id="${r.id}" data-field="chartNumber"
            value="${(r.chartNumber||'').replace(/"/g,'&quot;')}"
            oninput="updLedgerAC('${d}','${r.id}',this.value)"

          <div id="ac_${r.id}" class="ac-list" style="display:none"></div>
        </div>
      </td>
      <td style="width:80px"><input class="tci" placeholder="성명" data-row-id="${r.id}" data-field="patientName" value="${(r.patientName||'').replace(/"/g,'&quot;')}" oninput="updLR('${d}','${r.id}','patientName',this.value)"></td>
      <td style="width:80px"><input class="tci tci-num" style="min-width:70px" placeholder="0" value="${r.cashAmount||''}" oninput="updLR('${d}','${r.id}','cashAmount',this.value)"></td>
      <td style="width:80px"><input class="tci tci-num" placeholder="0" value="${r.transferAmount||''}" oninput="updLR('${d}','${r.id}','transferAmount',this.value)"></td>
      <td style="width:80px"><input class="tci tci-num" placeholder="0" value="${r.cardAmount||''}" oninput="updLR('${d}','${r.id}','cardAmount',this.value)"></td>
      <td style="width:70px"><input class="tci" placeholder="매입사" value="${(r.vendor||'').replace(/"/g,'&quot;')}" oninput="updLR('${d}','${r.id}','vendor',this.value)"></td>
      <td style="min-width:120px">
        <select class="tci" style="${r.note?'color:#7c3aed;font-weight:600':''}" onchange="setBigubyeoNote('${d}','${r.id}',this.value)">
          <option value="">비급여 선택</option>
          ${BIGUBYEO_PRESETS.map(p=>`<option value="${p.label}|${p.days}" ${r.note===p.label?'selected':''}>${p.label}</option>`).join('')}
        </select>
        ${r.note?`<div style="font-size:10px;color:#7c3aed;margin-top:2px;white-space:nowrap">
          📅<input type="date" class="tci" style="font-size:10px;padding:1px 3px;width:115px;margin-left:2px" value="${r.noteDate||d}" onchange="updLR('${d}','${r.id}','noteDate',this.value)" title="복약 시작일">
        </div>`:''}
      </td>
      <td style="min-width:90px">
        <select class="tci" data-row-id="${r.id}" data-field="category" onchange="updLR('${d}','${r.id}','category',this.value)"><option value="">구분</option>${CATEGORIES.map(c=>`<option ${r.category===c?'selected':''}>${c}</option>`).join('')}</select>
        ${r.category==='비급여'?`<div style="margin-top:3px">
          <select class="tci" style="font-size:10px;color:#7c3aed" onchange="setBigubyeo('${d}','${r.id}',this.value)">

          ${r.prescription?`<div style="font-size:10px;color:#7c3aed;margin-top:2px">

      <td style="width:80px"><select class="tci" onchange="updLR('${d}','${r.id}','guidanceType',this.value)"><option value="">안내</option>${GUIDANCE.map(g=>`<option ${r.guidanceType===g?'selected':''}>${g}</option>`).join('')}</select></td>

          <button class="ico-btn dl-btn" title="삭제" onclick="delLR('${d}','${r.id}')">${I.trash}</button>
        </div>

  }

  return`<div style="min-height:100vh;display:flex;flex-direction:column">

window.updLR=(d,id,field,val)=>{

window.delLR=(d,id)=>{if(!confirm('삭제하시겠습니까?'))return;saveLedger(d,getLedger(d).filter(r=>r.id!==id));sbDelete('ledger_rows',id);render()};
window.acPickLedger=(d,id,chart,name,phone,visitType)=>{
  // 상태 업데이트
  saveLedger(d,getLedger(d).map(r=>r.id===id?{
    ...r,
    chartNumber:chart,
    patientName:name,
    category:r.category||visitType||''
  }:r));
  if(_sb&&S.sbConnected) sbSave('ledger').catch(e=>console.error('acPick 저장오류:',e));
  // DOM 즉시 반영
  const inp=document.querySelector(`input[data-row-id="${id}"][data-field="chartNumber"]`);
  if(inp){inp.value=chart;}
  const nameInp=document.querySelector(`input[data-row-id="${id}"][data-field="patientName"]`);
  if(nameInp){
    nameInp.value=name;
    // 자동입력 시각 피드백 (초록 → 1.5초 후 원래대로)
    nameInp.style.transition='background 0.3s';
    nameInp.style.background='#f0fdf4';
    setTimeout(()=>{nameInp.style.background='';},1500);
  }
  const catSel=document.querySelector(`select[data-row-id="${id}"][data-field="category"]`);
  if(catSel&&!catSel.value&&visitType) catSel.value=visitType;
  // AC 닫기
  const acEl=document.getElementById('ac_'+id);
  if(acEl){acEl.innerHTML='';acEl.style.display='none';}
  // Supabase sync
  if(_sb&&S.sbConnected) sbSave('ledger');
  showToast(`${name} 자동입력 완료 ✓`);
};

function renderCalendar(){
  const m=S.calMonth;const[y,mo]=m.split('-').map(Number);
  const firstDay=new Date(y,mo-1,1).getDay();
  const daysInMonth=new Date(y,mo,0).getDate();
  const prevDays=new Date(y,mo-1,0).getDate();
  // 모든 일계표에서 appointmentDate 기준으로 달력에 표시
  const allAppts={};
  Object.entries(S.ledger).forEach(([ledgerDate,rs])=>{
    (rs||[]).filter(r=>r.appointmentDate&&!r.noShow).forEach(r=>{
      const d=r.appointmentDate;
      if(!allAppts[d])allAppts[d]=[];
      // 중복 방지 + ledgerDate(원본 일계표 날짜) 포함
      if(!allAppts[d].some(x=>x.chartNumber===r.chartNumber&&x.appointmentTime===r.appointmentTime))
        allAppts[d].push({...r, ledgerDate});
    });
  });
  const cells=[];
  for(let i=firstDay-1;i>=0;i--)cells.push({day:prevDays-i,cur:false});
  for(let i=1;i<=daysInMonth;i++)cells.push({day:i,cur:true});
  while(cells.length%7!==0)cells.push({day:cells.length-daysInMonth-firstDay+1+1,cur:false});
  const selDate=S.calSelectedDate;
  const selAppts=selDate?allAppts[selDate]||[]:[];

  return`<div class="content">
    <div class="page-title">📅 달력 예약뷰</div>
    <div class="action-bar">
      <div class="date-nav-wrap">
        <button class="date-nav-btn" onclick="btnCalPrev()">&#8249;</button>
        <div class="date-nav-center" style="min-width:90px;cursor:default"><span id="disp-cal-month">${m.replace('-','년 ')}월</span></div>
        <button class="date-nav-btn" onclick="btnCalNext()">&#8250;</button>
      </div>
      <button class="btn" onclick="S.calMonth=todayStr().slice(0,7);render()">오늘</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr${selDate?' 320px':''};gap:16px">
      <div>
        <div class="cal-grid">
          ${['일','월','화','수','목','금','토'].map(d=>`<div class="cal-hdr-cell">${d}</div>`).join('')}
          ${cells.map(c=>{
            const dateStr=c.cur?`${y}-${p2(mo)}-${p2(c.day)}`:null;
            const apts=dateStr&&allAppts[dateStr]?allAppts[dateStr]:[];
            const isToday=dateStr===todayStr();
            const isSel=dateStr===selDate;
            return`<div class="cal-cell${!c.cur?' other-month':''}${isToday&&!isSel?' today':''}${isSel?' selected':''}" onclick="${c.cur?`S.calSelectedDate=S.calSelectedDate==='${dateStr}'?null:'${dateStr}';render()`:''}" >
              <div class="cal-date-num">${c.day}</div>
              ${apts.slice(0,3).map(a=>`<div class="cal-apt-pill" style="background:#dbeafe;color:#1e40af">${a.patientName||a.chartNumber||'-'} ${a.appointmentTime||''}</div>`).join('')}
              ${apts.length>3?`<div style="font-size:10px;color:#9ca3af">+${apts.length-3}명</div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>
      ${selDate?`<div class="section-card" style="height:fit-content">
        <div class="section-hdr"><div class="section-title">${fmtDot(selDate)}</div><span class="badge badge-blue">${selAppts.length}명</span></div>
        ${selAppts.length===0?'<div class="no-data">예약 없음</div>':`<div style="overflow-y:auto;max-height:500px"><table style="font-size:13px;width:100%"><thead><tr><th>이름</th><th>시간</th><th>구분</th><th>원본</th></tr></thead><tbody>
        ${selAppts.map(r=>`<tr>
          <td style="font-weight:600">${r.patientName||'-'}</td>
          <td style="font-size:12px">${r.appointmentTime||'-'}</td>
          <td>${r.category?`<span class="badge badge-gray">${r.category}</span>`:'-'}</td>
          <td><button class="btn btn-sm" style="font-size:11px;padding:2px 8px;white-space:nowrap" onclick="S.ledgerDate='${r.ledgerDate||selDate}';nav('ledger')" title="${r.ledgerDate||selDate} 일계표로 이동">📋${r.ledgerDate?r.ledgerDate.slice(5).replace('-','/'):'당일'}</button></td>
        </tr>`).join('')}
        </tbody></table></div>`}
        <div style="padding:12px;display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-sm" onclick="S.ledgerDate='${selDate}';nav('ledger')">${I.ledger} 당일(${selDate.slice(5).replace('-','/')}) 일계표</button>
        </div>
      </div>`:''}
    </div>
  </div>`;
}

window.handleXlsUpload=(input)=>{
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      if(!window.XLSX){showToast('엑셀 라이브러리 로딩 중... 잠시 후 다시 시도해주세요','err');loadXLSX(()=>showToast('준비됐습니다. 다시 업로드해주세요'));return;}
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      if(rows.length<2){showToast('데이터가 없습니다 (헤더 포함 2행 이상 필요)','err');return;}
      const header=rows[0].map(h=>(h||'').toString().trim());
      // 컬럼 매핑 (헤더명으로 찾거나 순서로 fallback)
      function findCol(names){
        for(const n of names){const i=header.findIndex(h=>h.includes(n));if(i>=0)return i;}
        return -1;
      }
      const colChart=findCol(['차트번호','차트','chart'])>=0?findCol(['차트번호','차트','chart']):0;
      const colName=findCol(['이름','성명','name'])>=0?findCol(['이름','성명','name']):1;
      const colGender=findCol(['성별','gender'])>=0?findCol(['성별','gender']):2;
      const colPhone=findCol(['전화','연락처','phone','tel'])>=0?findCol(['전화','연락처','phone','tel']):3;
      const colVisit=findCol(['구분','visitType','방문','내원'])>=0?findCol(['구분','visitType','방문','내원']):4;
      const colRef=findCol(['내원경로','경로','referral'])>=0?findCol(['내원경로','경로','referral']):5;
      const colTreat=findCol(['치료','치료부위','treat'])>=0?findCol(['치료','치료부위','treat']):6;
      const colMemo=findCol(['메모','memo','비고','note'])>=0?findCol(['메모','memo','비고','note']):7;
      const parsed=rows.slice(1).filter(r=>r[colChart]||r[colName]).map(r=>{
        const chartNum=r[colChart]?r[colChart].toString().trim():'';
        const nm=r[colName]?r[colName].toString().trim():'';
        if(!chartNum&&!nm)return null;
        const treatRaw=r[colTreat]?r[colTreat].toString():'';
        const treatArr=treatRaw?treatRaw.split(/[,、/]+/).map(t=>t.trim()).filter(Boolean):[];
        return{
          id:uid(),chartNumber:chartNum,name:nm,
          gender:r[colGender]?r[colGender].toString().trim():'남',
          phone:r[colPhone]?r[colPhone].toString().trim():'',
          visitType:r[colVisit]?r[colVisit].toString().trim():'신환',
          referralPath:r[colRef]?r[colRef].toString().trim():'기타',
          treatmentArea:treatArr,
          memo:r[colMemo]?r[colMemo].toString().trim():'',
          createdAt:new Date().toISOString()
        };
      }).filter(Boolean);
      if(parsed.length===0){showToast('유효한 데이터가 없습니다','err');return;}
      S.xlsImportData=parsed;
      S.xlsImportMode='skip';
      render();
    }catch(err){
      showToast('파일 읽기 오류: '+err.message,'err');
      console.error(err);
    }
    input.value='';
  };
  reader.onerror=()=>showToast('파일을 읽을 수 없습니다','err');
  reader.readAsArrayBuffer(file);
};

window.confirmImport=async()=>{
  const data=S.xlsImportData;if(!data)return;
  let added=0,skipped=0,overwritten=0;
  data.forEach(r=>{
    const idx=S.patients.findIndex(p=>p.chartNumber===r.chartNumber);
    if(idx>=0){
      if(S.xlsImportMode==='overwrite'){S.patients[idx]={...r,id:S.patients[idx].id};overwritten++;}
      else skipped++;
    } else {S.patients.push(r);added++;}
  });
  S.xlsImportData=null;
  render();
  // ① localStorage - 용량 초과 시 분할 저장
  // patients는 localStorage 저장 안 함 (5MB 초과 방지, Supabase에만 저장)
  if(!_sb||!S.sbConnected){
    showToast(`✅ 로컬 저장! 신규 ${added}명 (Supabase 미연결)`);
    return;
  }
  // ② Supabase 고속 병렬 배치 저장 (8000명 대응)
  const total=S.patients.length;
  const BATCH=200, PARALLEL=5;
  const rows=S.patients.map(ptToRow);
  const batches=[];
  for(let i=0;i<rows.length;i+=BATCH) batches.push(rows.slice(i,i+BATCH));
  let savedCount=0, failCount=0;
  _isSaving=false;
  showToast(`저장 시작 (${total}명 / ${batches.length}배치)`);
  for(let i=0;i<batches.length;i+=PARALLEL){
    const group=batches.slice(i,i+PARALLEL);
    await Promise.all(group.map(async(batch,gi)=>{
      for(let retry=0;retry<4;retry++){
        try{
          const{error}=await _sb.from('patients').upsert(batch,{onConflict:'id'});
          if(!error){savedCount+=batch.length;return;}
          if(error.code==='23505'||error.message?.includes('duplicate')){savedCount+=batch.length;return;}
          console.warn('배치'+(i+gi)+' 재시도'+(retry+1),error.message);
          await new Promise(r=>setTimeout(r,300*(retry+1)));
        }catch(e){ await new Promise(r=>setTimeout(r,300*(retry+1))); }
      }
      failCount+=batch.length;
    }));
    // 진행률 표시 (100배치마다)
    if((i/PARALLEL)%4===0||i+PARALLEL>=batches.length){
      const pct=Math.round(Math.min(savedCount+failCount,total)/total*100);
      showToast(`저장 중... ${savedCount}/${total}명 (${pct}%)`);
    }
    if(i+PARALLEL<batches.length) await new Promise(r=>setTimeout(r,80));
  }
  if(failCount===0){
    showToast(`✅ ${total}명 전체 저장 완료! 신규 ${added}명${overwritten>0?' · 수정 '+overwritten+'명':''}${skipped>0?' · 건너뜀 '+skipped+'건':''}`);
  } else {
    showToast(`⚠️ ${savedCount}명 저장 / ${failCount}명 실패`,'err');
  }
};

window.savePatientsToDB=async function(){
  if(!S.patients.length){showToast('저장할 환자가 없습니다','err');return;}
  // patients는 localStorage 저장 안 함 (Supabase에만 저장)
  if(!_sb||!S.sbConnected){
    showToast('✅ 로컬에 저장됨 (Supabase 미연결)');return;
  }
  const total=S.patients.length;
  const BATCH=200,PARALLEL=5;
  const btn=document.querySelector('[onclick="savePatientsToDB()"]');
  if(btn){btn.textContent='저장 중...';btn.disabled=true;}
  const allRows=S.patients.map(ptToRow);
  const batches=[];
  for(let i=0;i<allRows.length;i+=BATCH) batches.push(allRows.slice(i,i+BATCH));
  let saved=0,failed=0;
  _isSaving=false;
  for(let i=0;i<batches.length;i+=PARALLEL){
    const group=batches.slice(i,i+PARALLEL);
    await Promise.all(group.map(async(batch)=>{
      for(let retry=0;retry<4;retry++){
        try{
          const{error}=await _sb.from('patients').upsert(batch,{onConflict:'id'});
          if(!error){saved+=batch.length;return;}
          if(error.code==='23505'||error.message?.includes('duplicate')){saved+=batch.length;return;}
          await new Promise(r=>setTimeout(r,300*(retry+1)));
        }catch(e){ await new Promise(r=>setTimeout(r,300*(retry+1))); }
      }
      failed+=batch.length;
    }));
    const pct=Math.round(Math.min(saved+failed,total)/total*100);
    if(btn)btn.textContent=`${pct}% (${Math.min(saved+failed,total)}/${total})`;
    if(i+PARALLEL<batches.length) await new Promise(r=>setTimeout(r,80));
  }
  if(btn){btn.textContent='💾 저장하기';btn.disabled=false;}
  if(failed===0) showToast(`✅ ${total}명 전체 저장 완료!`);
  else showToast(`⚠️ ${saved}명 저장 / ${failed}명 실패`,'err');
};

  const nameMap={};

    if(!nm) return;
    if(!nameMap[nm]) nameMap[nm]=[];
    nameMap[nm].push(p);
  });

  if(!dups.length){showToast('중복 이름이 없어요! ✅');return;}

  // 팝업 HTML 생성
  const popHtml=dups.map(([nm,pts])=>{
    const sorted=[...pts].sort((a,b)=>(parseInt(a.chartNumber)||0)-(parseInt(b.chartNumber)||0));
    return`<div style="border:1px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:10px">
      <div style="font-weight:700;color:#7c3aed;margin-bottom:8px">👥 "${nm}" — ${pts.length}명</div>

          <span>${p.name}</span>
          <span style="font-size:11px;color:#9ca3af;margin-left:6px">${p.phone||''} ${p.visitType||''}</span>
        </label>
      </div>`).join('')}
    </div>`;
  }).join('');

  const overlay=document.createElement('div');
  overlay.id='dup-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML=`<div style="background:#fff;border-radius:14px;max-width:640px;width:100%;max-height:80vh;display:flex;flex-direction:column">
    <div style="padding:16px 20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:16px;font-weight:700">👥 중복 이름 정리</div>
      <div style="font-size:12px;color:#6b7280">✅ 체크된 환자는 <b>유지</b>, 미체크는 삭제됩니다</div>
    </div>
    <div style="overflow-y:auto;flex:1;padding:16px" id="dup-body">${popHtml}</div>
    <div style="padding:12px 16px;border-top:1px solid #e5e7eb;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="document.getElementById('dup-overlay').remove()">취소</button>
      <button class="btn" style="background:#dc2626;color:#fff;border-color:#dc2626" onclick="applyDupDelete()">🗑 미선택 항목 삭제</button>
    </div>
  </div>`;
  // 초기 선택 상태 설정
  window._dupKeepIds=new Set();
  dups.forEach(([,pts])=>{
    const sorted=[...pts].sort((a,b)=>(parseInt(a.chartNumber)||0)-(parseInt(b.chartNumber)||0));
    window._dupKeepIds.add(sorted[0].id); // 첫번째(차트번호 가장 작은)는 기본 유지
  });

window.toggleDupSel=function(id,checked){

  if(checked) window._dupKeepIds.add(id);
  else window._dupKeepIds.delete(id);
};

window.applyDupDelete=async function(){
  const nameMap={};
  S.patients.forEach(p=>{
    const nm=(p.name||'').trim();
    if(!nm) return;
    if(!nameMap[nm]) nameMap[nm]=[];
    nameMap[nm].push(p);
  });
  const dupNames=new Set(Object.entries(nameMap).filter(([,a])=>a.length>1).map(([n])=>n));
  const toDelete=S.patients.filter(p=>dupNames.has((p.name||'').trim())&&!window._dupKeepIds.has(p.id));
  if(!toDelete.length){showToast('삭제할 항목 없음');document.getElementById('dup-overlay')?.remove();return;}
  const delIds=toDelete.map(p=>p.id);
  console.log('삭제 대상:', delIds.length+'명');
  document.getElementById('dup-overlay')?.remove();
  showToast('삭제 중... ('+delIds.length+'명)');

  // 1. 로컬 먼저 제거 + localStorage 캐시 완전 삭제
  S.patients=S.patients.filter(p=>!delIds.includes(p.id));
  try{localStorage.removeItem('kh365_patients');}catch(e){}
  render();

  // 2. Supabase 삭제
  if(_sb&&S.sbConnected){
    const BATCH=50;
    let failed=0;
    for(let i=0;i<delIds.length;i+=BATCH){
      const batch=delIds.slice(i,i+BATCH);
      let ok=false;
      for(let retry=0;retry<3;retry++){
        const{error}=await _sb.from('patients').delete().in('id',batch);
        if(!error){ok=true;console.log('Supabase 삭제 OK:', batch.length+'명');break;}
        console.warn('삭제 재시도'+(retry+1)+':', error.message);
        await new Promise(r=>setTimeout(r,500*(retry+1)));
      }
      if(!ok) failed+=batch.length;
    }
    // 검증: 아직 남아있으면 재삭제
    const{data:check}=await _sb.from('patients').select('id').in('id',delIds);
    if(check&&check.length>0){
      console.warn('아직 남은 데이터 강제 재삭제:', check.length+'명');
      await _sb.from('patients').delete().in('id',check.map(r=>r.id));
    }
    if(failed===0) showToast('✅ '+delIds.length+'명 완전 삭제! (새로고침해도 유지)');
    else showToast('⚠️ '+failed+'명 삭제 실패 - 다시 시도해주세요','err');
  } else {
    showToast('✅ 로컬 삭제됨 (Supabase 미연결 - 💾저장하기 눌러주세요)','err');
  }
}

window.delPt=(id)=>{if(!confirm('삭제하시겠습니까?'))return;S.patients=S.patients.filter(p=>p.id!==id);save('patients');sbDelete('patients',id);showToast('삭제됨');render()};

// ── 새/수정 환자 ───────────────────────────────────────

    const idx=pt.treatmentArea.indexOf(area);
    if(idx>=0)pt.treatmentArea.splice(idx,1);else pt.treatmentArea.push(area);

  return`<div class="content" style="max-width:700px">

        <div class="form-group"><label class="lbl">이름 *</label><input class="form-inp" placeholder="홍길동" value="${(pt.name||'').replace(/"/g,'&quot;')}" oninput="${isEdit?'S.editPt':'S.newPt'}.name=this.value"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="lbl">성별</label><select class="form-inp" onchange="${isEdit?'S.editPt':'S.newPt'}.gender=this.value"><option ${pt.gender==='남'?'selected':''}>남</option><option ${pt.gender==='여'?'selected':''}>여</option></select></div>
        <div class="form-group"><label class="lbl">전화번호</label><input class="form-inp" placeholder="010-0000-0000" value="${(pt.phone||'').replace(/"/g,'&quot;')}" oninput="${isEdit?'S.editPt':'S.newPt'}.phone=this.value"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="lbl">구분</label><select class="form-inp" onchange="${isEdit?'S.editPt':'S.newPt'}.visitType=this.value">${VISIT_TYPES.map(t=>`<option ${pt.visitType===t?'selected':''}>${t}</option>`).join('')}</select></div>
        <div class="form-group"><label class="lbl">내원경로</label><select class="form-inp" onchange="${isEdit?'S.editPt':'S.newPt'}.referralPath=this.value">${REFERRAL.map(r=>`<option ${pt.referralPath===r?'selected':''}>${r}</option>`).join('')}</select></div>

        </div>
      </div>
      <div class="form-group"><label class="lbl">메모</label><textarea class="form-inp" rows="2" placeholder="특이사항..." oninput="${isEdit?'S.editPt':'S.newPt'}.memo=this.value">${pt.memo||''}</textarea></div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button class="btn btn-primary" onclick="${isEdit?'saveEditPt()':'saveNewPt()'}">💾 저장</button>
        <button class="btn" onclick="nav('patients')">취소</button>
        ${isEdit?`<button class="btn btn-danger" onclick="delPt('${pt.id}')">삭제</button>`:''}
      </div>
    </div>

}
window.saveNewPt=()=>{
  const p=S.newPt;
  if(!p.chartNumber||!p.name)return showToast('차트번호와 이름은 필수입니다','err');
  if(S.patients.some(pt=>pt.chartNumber===p.chartNumber))return showToast('이미 등록된 차트번호입니다','err');
  const newPatient={...p,id:uid(),createdAt:new Date().toISOString()};
  S.patients.push(newPatient);
  try{localStorage.setItem('kh365_patients',JSON.stringify(S.patients));}catch(e){}
  // 신규 환자 1명만 바로 Supabase에 저장 (빠름)
  if(_sb&&S.sbConnected){
    _sb.from('patients').upsert([ptToRow(newPatient)],{onConflict:'id'})
      .then(({error})=>{if(error)console.error('신규환자 저장오류:',error);else console.log('신규환자 저장완료');})
      .catch(e=>console.error('신규환자 저장예외:',e));
  }
  S.newPt={chartNumber:'',name:'',gender:'남',phone:'',visitType:'신환',referralPath:'지인소개',treatmentArea:[],memo:''};
  showToast('환자 등록 완료 ✓ (일계표 자동완성에 즉시 반영)');
  nav('patients');
};
window.saveEditPt=()=>{
  const p=S.editPt;
  if(!p.chartNumber||!p.name)return showToast('차트번호와 이름은 필수입니다','err');
  S.patients=S.patients.map(pt=>pt.id===p.id?{...p}:pt);
  try{localStorage.setItem('kh365_patients',JSON.stringify(S.patients));}catch(e){}
  // 수정된 환자 1명만 Supabase 저장
  if(_sb&&S.sbConnected){
    _sb.from('patients').upsert([ptToRow(p)],{onConflict:'id'})
      .then(({error})=>{if(error)console.error('환자수정 저장오류:',error);})
      .catch(e=>console.error('환자수정 저장예외:',e));
  }
  showToast('수정 완료 ✓');nav('patients');
};

window.hcUpd=(d,id,field,val)=>{
  const rows=getHappyCalls(d).map(h=>h.id===id?{...h,[field]:val}:h);
  S.happycalls[d]=rows;save('happycalls');
  // 상태/예약완료 변경 시 해당 행만 DOM 업데이트 (전체 re-render 방지)
  if(field==='status'){
    const st=HC_STATUS.find(s=>s.id===val);
    // 상태 버튼들만 업데이트
    const row=document.getElementById('hcrow_'+id);
    if(row){
      const btns=row.querySelectorAll('[data-hc-status]');
      btns.forEach(btn=>{
        const sid=btn.getAttribute('data-hc-status');
        const s=HC_STATUS.find(x=>x.id===sid);
        if(!s)return;
        const active=sid===val;
        btn.style.border=`1px solid ${active?s.color:s.color+'44'}`;
        btn.style.background=active?s.bg:'#fff';
        btn.style.fontWeight=active?'600':'400';
      });
    }
  }
  if(field==='apptDone'){
    const row=document.getElementById('hcrow_'+id);
    if(row){
      const cb=row.querySelector('[data-hc-appt]');
      const lbl=row.querySelector('[data-hc-appt-lbl]');
      if(cb)cb.checked=val;
      if(lbl){lbl.textContent=val?'완료':'미완';lbl.style.color=val?'#2563eb':'#9ca3af';}
    }
  }
};
window.hcDel=(d,id)=>{

window.hcSetCallTime=(d,id)=>{

};
window.hcAddManual=(d)=>{

window.hcAddFromSearch=(d,ptId)=>{
  const pt=S.patients.find(p=>p.id===ptId);if(!pt)return;
  if(!S.happycalls[d])S.happycalls[d]=[];
  if(S.happycalls[d].some(h=>h.chartNumber===pt.chartNumber)){
    showToast('이미 추가된 환자입니다','err');S.hcPtSearch='';S.hcAcOpen=false;render();return;
  }
  S.happycalls[d].push(newHC(d,pt));
  save('happycalls');
  if(_sb&&S.sbConnected) sbSave('happycalls');
  S.hcPtSearch='';S.hcAcOpen=false;render();

};
window.hcImportFromLedger=async(d)=>{
  // Supabase 연결됐는데 환자 비어있으면 먼저 로드
  if(_sb && S.sbConnected && S.patients.length===0){
    showToast('환자 데이터 로드 중...');
    await sbLoadAll();
  }
  const ldg=getLedger(d)||[];
  if(!ldg.length){showToast('일계표에 데이터가 없습니다','err');return;}
  if(!S.happycalls[d])S.happycalls[d]=[];
  let added=0;
  ldg.forEach(r=>{
    if(!(r.patientName||r.chartNumber))return;
    if(S.happycalls[d].some(h=>h.chartNumber===r.chartNumber&&h.patientName===r.patientName))return;
    // 환자 목록에서 정보 매칭 (전화번호 연동)
    const pt=S.patients.find(p=>p.chartNumber===r.chartNumber);
    S.happycalls[d].push({
      id:uid(),date:d,patientId:pt?pt.id:'',
      chartNumber:r.chartNumber||'',
      patientName:r.patientName||pt?.name||'',
      phone:pt?.phone||r.phone||'',
      visitType:r.category||pt?.visitType||'재진',
      status:'pending',memo:'',callTime:'',apptDone:false,
      createdAt:new Date().toISOString()
    });
    added++;
  });
  save('happycalls');
  if(_sb&&S.sbConnected) sbSave('happycalls');
  showToast(added>0?`${added}명 불러오기 완료 ✓`:'이미 모두 추가된 환자입니다');
  render();
};
window.hcDownloadExcel=(d)=>{
  if(!window.XLSX){loadXLSX(()=>hcDownloadExcel(d));return;}
  const hcs=getHappyCalls(d);
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet([
    ['날짜','차트번호','환자명','전화번호','구분','통화시간','상태','메모'],
    ...hcs.map(h=>[h.date,h.chartNumber||'',h.patientName||'',h.phone||'',h.visitType||'',h.callTime||'',HC_STATUS.find(s=>s.id===h.status)?.label||h.status,h.memo||''])
  ]);
  ws['!cols']=[{wch:12},{wch:10},{wch:10},{wch:14},{wch:8},{wch:8},{wch:6},{wch:30}];
  XLSX.utils.book_append_sheet(wb,ws,'해피콜');
  xlsxDownload(wb,`해피콜_${d}.xlsx`);
  showToast('엑셀 다운로드 완료 ✓');
};

function renderSchedule(){
  const m=S.scheduleMonth;const[y,mo]=m.split('-').map(Number);
  const days=new Date(y,mo,0).getDate();
  const emps=S.employees;
  function getShift(emp,d){return(S.schedule[`${m}-${p2(d)}`]||{})[emp]||''}
  function cycleShift(emp,d){
    const key=`${m}-${p2(d)}`;if(!S.schedule[key])S.schedule[key]={};
    const cur=S.schedule[key][emp]||'';const idx=SHIFTS.indexOf(cur);
    S.schedule[key][emp]=SHIFTS[(idx+1)%SHIFTS.length];save('schedule');if(_sb&&S.sbConnected)sbSave('schedule').catch(e=>console.error('schedule:',e));render();
  }
  window._cycleShift=cycleShift;
  window.setShift=function(emp,d,val){
    const key=`${m}-${p2(d)}`;
    if(!S.schedule[key])S.schedule[key]={};
    S.schedule[key][emp]=val;
    save('schedule');
    if(_sb&&S.sbConnected)sbSave('schedule').catch(e=>console.error('schedule:',e));
    const sel=event.target;
    if(sel){
      const c=SHIFT_COLORS[val]||'';
      sel.style.background=c?c+'33':'#f9fafb';
      sel.style.color=c||'#9ca3af';
      sel.style.borderColor=c||'#e5e7eb';
      sel.style.fontWeight=val?'700':'400';
    }
  };
  return`<div class="content">
    <div class="page-title">👨‍⚕️ 직원 근무표</div>
    <div class="action-bar">
      <div class="date-nav-wrap">
        <button class="date-nav-btn" onclick="btnSchedPrev()">&#8249;</button>
        <div class="date-nav-center" style="min-width:90px;cursor:default"><span id="disp-sched-month">${m.replace('-','년 ')}월</span></div>
        <button class="date-nav-btn" onclick="btnSchedNext()">&#8250;</button>
      </div>
      <button class="btn" onclick="addEmp()">+ 직원 추가</button>
    </div>

window.saveSchedNotice=async function(month){
  const ta=document.getElementById('sched-notice-area');
  const text=ta?ta.value:'';
  if(!S.scheduleNotice) S.scheduleNotice={};
  S.scheduleNotice[month]=text;
  try{localStorage.setItem('kh365_scheduleNotice',JSON.stringify(S.scheduleNotice));}catch(e){}
  const el=document.getElementById('sched-notice-saved');
  if(!_sb||!S.sbConnected){
    if(el) el.textContent='로컬 저장됨';
    return;
  }
  try{
    await _sb.from('message_logs').delete().eq('patient_name','__SCHED_NOTICE__').eq('to_number',month);
    const{error}=await _sb.from('message_logs').insert([{
      created_at_kr:new Date().toLocaleString('ko-KR'),
      patient_name:'__SCHED_NOTICE__',
      to_number:month,
      type:'sched_notice',
      status:'active',
      text:text
    }]);
    if(error) throw error;
    if(el) el.textContent='✅ '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})+' 저장됨';
  }catch(e){
    console.error('전달사항 저장 오류:',e);
    if(el) el.textContent='⚠️ 저장 실패';
  }
};

window.sendMsg=async()=>{
  const selPt=S.patients.find(p=>p.id===S.msgPatientId);
  if(!selPt||!selPt.phone)return showToast('환자 및 전화번호를 확인하세요','err');
  const tmpl=MSG_TEMPLATES.find(t=>t.id===S.msgTemplate);
  let txt=S.msgText||tmpl?.text||'';
  txt=txt.replace('{name}',selPt.name);
  const logEntry={id:uid(),createdAt:new Date().toLocaleString('ko-KR'),patientName:selPt.name,to:selPt.phone,type:tmpl?.label||'직접입력',text:txt,status:'pending'};
  if(S.solapiKey&&S.solapiSecret&&S.solapiSender){
    try{
      const HMAC=async(k,m)=>{const enc=new TextEncoder();const key=await crypto.subtle.importKey('raw',enc.encode(k),{name:'HMAC',hash:'SHA-256'},false,['sign']);const sig=await crypto.subtle.sign('HMAC',key,enc.encode(m));return Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('')};
      const ts=Date.now().toString();const salt=Math.random().toString(36).slice(2);
      const sig=await HMAC(S.solapiSecret,ts+salt);
      const resp=await fetch('https://api.solapi.com/messages/v4/send',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`HMAC-SHA256 apiKey=${S.solapiKey}, date=${ts}, salt=${salt}, signature=${sig}`},body:JSON.stringify({message:{to:selPt.phone.replace(/-/g,''),from:S.solapiSender,text:txt}})});
      logEntry.status=resp.ok?'success':'error';
    }catch{logEntry.status='error';}
  } else {logEntry.status='success';}
  S.messageLogs.unshift(logEntry);save('messageLogs');showToast(logEntry.status==='success'?'전송 완료 ✓':'전송 실패','err');render();
};

// ── 통계 ────────────────────────────────────────────
function renderStats(){
  const today=todayStr();
  const tab=S.statsTab||'daily';

  // ── 공통 유틸 ──
  const fmtKrw2=n=>n>=10000?Math.round(n/10000)+'만원':n.toLocaleString()+'원';
  const CATS=CATEGORIES.filter(c=>c!=='비급여');
  const catColor={'재진':'#94a3b8','신환':'#fbbf24','ta':'#22d3ee','ta초진':'#22d3ee',
    'ta일반':'#22d3ee','ta추나':'#22d3ee','6개월재초진':'#fb923c','건보추나':'#a78bfa',
    '비급여':'#f472b6'};

  // ── 일별 통계 (최근 14일) ──
  function getDailyStats(){
    const rows=[];
    for(let i=13;i>=0;i--){
      const d=addDays(today,-i);
      const dayRows=getLedger(d).filter(r=>r.chartNumber||r.patientName);
      const rev=dayRows.reduce((s,r)=>s+(+r.cashAmount||0)+(+r.transferAmount||0)+(+r.cardAmount||0),0);
      const catCount={};
      dayRows.forEach(r=>{if(r.category)catCount[r.category]=(catCount[r.category]||0)+1;});
      rows.push({date:d,count:dayRows.length,rev,catCount});
    }
    return rows;
  }

  // ── 주별 통계 (최근 8주) ──
  function getWeeklyStats(){
    const rows=[];
    for(let w=7;w>=0;w--){
      const weekStart=addDays(today,-w*7-new Date().getDay());
      const weekEnd=addDays(weekStart,6);
      let count=0,rev=0;
      const catCount={};
      for(let i=0;i<=6;i++){
        const d=addDays(weekStart,i);
        const dayRows=getLedger(d).filter(r=>r.chartNumber||r.patientName);
        count+=dayRows.length;
        rev+=dayRows.reduce((s,r)=>s+(+r.cashAmount||0)+(+r.transferAmount||0)+(+r.cardAmount||0),0);
        dayRows.forEach(r=>{if(r.category)catCount[r.category]=(catCount[r.category]||0)+1;});
      }
      rows.push({date:weekStart+'~'+weekEnd.slice(5),count,rev,catCount});
    }
    return rows;
  }

  // ── 월별 통계 (최근 6개월) ──
  function getMonthlyStats(){
    const rows=[];
    for(let m=5;m>=0;m--){
      const d=new Date();
      d.setDate(1);
      d.setMonth(d.getMonth()-m);
      const month=d.getFullYear()+'-'+(String(d.getMonth()+1).padStart(2,'0'));
      const monthRows=Object.entries(S.ledger)
        .filter(([k])=>k.startsWith(month))
        .flatMap(([,rs])=>rs.filter(r=>r.chartNumber||r.patientName));
      const rev=monthRows.reduce((s,r)=>s+(+r.cashAmount||0)+(+r.transferAmount||0)+(+r.cardAmount||0),0);
      const catCount={};
      monthRows.forEach(r=>{if(r.category)catCount[r.category]=(catCount[r.category]||0)+1;});
      rows.push({date:month,count:monthRows.length,rev,catCount});
    }
    return rows;
  }

  const daily=getDailyStats();
  const weekly=getWeeklyStats();
  const monthly=getMonthlyStats();

  const data=tab==='daily'?daily:tab==='weekly'?weekly:monthly;
  const maxRev=Math.max(...data.map(d=>d.rev),1);
  const maxCount=Math.max(...data.map(d=>d.count),1);

  // 이번달 통계
  const thisMonth=today.slice(0,7);
  const thisMonthRows=Object.entries(S.ledger)
    .filter(([k])=>k.startsWith(thisMonth))
    .flatMap(([,rs])=>rs.filter(r=>r.chartNumber||r.patientName));
  const thisMonthRev=thisMonthRows.reduce((s,r)=>s+(+r.cashAmount||0)+(+r.transferAmount||0)+(+r.cardAmount||0),0);
  const goal=+S.goalRevenue||0;
  const goalPct=goal>0?Math.min(100,Math.round(thisMonthRev/goal*100)):0;

  // 구분별 합계 (이번달)
  const catSummary={};
  thisMonthRows.forEach(r=>{if(r.category)catSummary[r.category]=(catSummary[r.category]||0)+1;});
  const catEntries=Object.entries(catSummary).sort((a,b)=>b[1]-a[1]);

  return`<div class="content">
    <div class="page-title">📊 통계</div>

    <!-- 목표 매출 카드 -->
    <div class="section-card" style="margin-bottom:16px">
      <div class="section-hdr">
        <div class="section-title">🎯 이번달 목표 매출</div>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="number" class="form-inp" style="width:140px;font-size:13px"
            placeholder="목표 금액 (원)" value="${goal||''}"
            onchange="S.goalRevenue=+this.value;render()" min="0" step="100000">
        </div>
      </div>
      <div style="padding:0 4px 8px">
        ${goal>0?`
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
          <span style="color:#374151">현재 <b>${fmtKrw(thisMonthRev)}</b></span>
          <span style="color:#6b7280">목표 <b>${fmtKrw(goal)}</b></span>
          <span style="font-weight:700;color:${goalPct>=100?'#059669':goalPct>=70?'#2563eb':'#dc2626'}">${goalPct}%</span>
        </div>
        <div style="background:#e5e7eb;border-radius:99px;height:12px;overflow:hidden">
          <div style="height:100%;border-radius:99px;background:${goalPct>=100?'#059669':goalPct>=70?'#2563eb':'#3b82f6'};width:${goalPct}%;transition:width .5s"></div>
        </div>
        <div style="font-size:12px;color:#6b7280;margin-top:6px">
          ${goalPct>=100?'🎉 목표 달성!':fmtKrw(goal-thisMonthRev)+' 남음'}
        </div>
        `:'<div style="font-size:13px;color:#9ca3af">목표 금액을 입력하면 진행률이 표시됩니다</div>'}
      </div>
    </div>

    <!-- 탭 선택 -->
    <div style="display:flex;gap:4px;margin-bottom:12px">
      ${['daily','weekly','monthly'].map((t,i)=>`
        <button class="btn${S.statsTab===t?' btn-primary':''}" style="font-size:13px"
          onclick="S.statsTab='${t}';render()">
          ${'일별(14일)/주별(8주)/월별(6개월)'.split('/')[i]}
        </button>`).join('')}
    </div>

    <!-- 매출 + 환자수 차트 -->
    <div class="section-card" style="margin-bottom:16px">
      <div class="section-hdr"><div class="section-title">💰 매출 & 환자수</div></div>
      <div style="overflow-x:auto;padding-bottom:8px">
        <div style="display:flex;align-items:flex-end;gap:6px;min-width:${data.length*60}px;height:180px;padding:0 8px">
          ${data.map((d,i)=>{
            const revH=Math.round((d.rev/maxRev)*140)||2;
            const cntH=Math.round((d.count/maxCount)*140)||2;
            const isToday=d.date===today||d.date.startsWith(today.slice(0,7));
            return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
              <div style="font-size:10px;color:#6b7280;white-space:nowrap">${d.rev>0?fmtKrw2(d.rev):''}</div>

window.exportBackup=()=>{
  const data={
    _version:2, _exportedAt:new Date().toISOString(),
    patients:S.patients, ledger:S.ledger, employees:S.employees,
    schedule:S.schedule, messageLogs:S.messageLogs, inpatients:S.inpatients,
    happycalls:S.happycalls, user:S.user,
    solapiKey:S.solapiKey, solapiSecret:S.solapiSecret, solapiSender:S.solapiSender
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`clinic_backup_${todayStr()}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('백업 완료 ✓ (clinic_backup_'+todayStr()+'.json)');
};
window.importBackup=(input)=>{
  const file=input.files[0]; if(!file)return;
  if(!confirm('백업 파일을 복원하면 현재 데이터가 모두 교체됩니다.\n계속하시겠습니까?'))return;
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data._version)throw new Error('올바른 백업 파일이 아닙니다');
      if(data.patients)S.patients=data.patients;
      if(data.ledger)S.ledger=data.ledger;
      if(data.employees)S.employees=data.employees;
      if(data.schedule)S.schedule=data.schedule;
      if(data.messageLogs)S.messageLogs=data.messageLogs;
      if(data.inpatients)S.inpatients=data.inpatients;
      if(data.happycalls)S.happycalls=data.happycalls;
      if(data.user)S.user=data.user;
      if(data.solapiKey)S.solapiKey=data.solapiKey;
      if(data.solapiSecret)S.solapiSecret=data.solapiSecret;
      if(data.solapiSender)S.solapiSender=data.solapiSender;
      // 전체 저장
      ['patients','ledger','employees','schedule','messageLogs','inpatients','happycalls','user','solapiKey','solapiSecret','solapiSender'].forEach(k=>save(k));
      showToast('복원 완료 ✓ 환자 '+S.patients.length+'명 불러옴');
      render();
    }catch(err){showToast('복원 실패: '+err.message,'err');console.error(err);}
    input.value='';
  };
  reader.readAsText(file);
};
window.clearAllData=()=>{

};

window.doLogin=()=>{
  // Rate Limiting - 5회 실패 시 30초 잠금
  const now=Date.now();
  const failKey='kh365_login_fail';
  const lockKey='kh365_login_lock';
  try{
    const lockUntil=+localStorage.getItem(lockKey)||0;
    if(lockUntil>now){
      const sec=Math.ceil((lockUntil-now)/1000);
      const errEl=document.getElementById('login_err');
      if(errEl)errEl.textContent='⛔ 너무 많이 시도했습니다. '+sec+'초 후 재시도해주세요.';
      return;
    }
  }catch(e){}

  const email=(document.getElementById('li_email')?.value||'').trim().toLowerCase();
  const pw=document.getElementById('li_pw')?.value||'';
  const errEl=document.getElementById('login_err');
  if(!email||!pw){
    if(errEl)errEl.textContent='이메일과 비밀번호를 입력해주세요.';
    return;
  }
  const user=USERS.find(u=>u.email.toLowerCase()===email&&u.pw===pw);
  if(user){
    // 로그인 성공 - 실패 카운트 초기화
    try{localStorage.removeItem(failKey);localStorage.removeItem(lockKey);}catch(e){}
    S.isLoggedIn=true;
    S.user={name:user.name,email:user.email,role:user.role};
    try{
      localStorage.setItem('kh365__loggedIn','1');
      localStorage.setItem('kh365__user',JSON.stringify(S.user));
    }catch{}
    render();
  } else {
    // 실패 카운트 증가
    try{
      const fails=(+localStorage.getItem('kh365_login_fail')||0)+1;
      localStorage.setItem('kh365_login_fail',fails);
      if(fails>=5){
        const lockUntil=Date.now()+30000; // 30초 잠금
        localStorage.setItem('kh365_login_lock',lockUntil);
        if(errEl)errEl.textContent='⛔ 5회 실패! 30초 동안 로그인이 잠깁니다.';
        return;
      }
      if(errEl)errEl.textContent='이메일 또는 비밀번호가 올바르지 않습니다. ('+fails+'/5회)';
    }catch(e){
      if(errEl)errEl.textContent='이메일 또는 비밀번호가 올바르지 않습니다.';
    }
    const pwEl=document.getElementById('li_pw');
    if(pwEl){pwEl.style.borderColor='#dc2626';setTimeout(()=>{pwEl.style.borderColor='';},2000);}
  }
};

  if(!inp)return;
  var rect=triggerEl?triggerEl.getBoundingClientRect():null;
  // input을 클릭 요소 바로 위에 정확히 덮어씌움 (크기 동일하게)
  if(rect){
    inp.style.cssText='position:fixed;top:'+rect.top+'px;left:'+rect.left+'px;width:'+rect.width+'px;height:'+rect.height+'px;opacity:0.01;pointer-events:auto;z-index:9999;border:none;background:transparent;cursor:pointer;font-size:16px;';
  }
  inp.focus();
  try{ inp.showPicker(); }catch(e){ inp.click(); }
  // 선택 완료 or 취소 시 숨김
  function hide(){
    inp.style.cssText='position:fixed;top:-300px;left:-300px;width:1px;height:1px;opacity:0;pointer-events:none;';
    inp.removeEventListener('change',hide);
    inp.removeEventListener('blur',hide);
  }
  setTimeout(function(){
    inp.addEventListener('change',hide);
    inp.addEventListener('blur',function(){setTimeout(hide,200);});
  },100);
};

var _dateBtnLock=false;
function _doDateChange(delta){
  if(_dateBtnLock)return;
  _dateBtnLock=true;
  if(delta===0) S.ledgerDate=todayStr();
  else S.ledgerDate=addDays(S.ledgerDate,delta);
  if(S.wardModal==='daily') S.wardDailyDate=S.ledgerDate;
  var e=document.getElementById('disp-dash-date');
  if(e)e.textContent=fmtNav(S.ledgerDate);
  var e2=document.getElementById('disp-ledger-date');
  if(e2)e2.textContent=fmtNav(S.ledgerDate);
  setTimeout(function(){render();_dateBtnLock=false;},50);
}
window.btnDatePrev=function(ev){if(ev){ev.preventDefault();ev.stopPropagation();}_doDateChange(-1);}

function init(){
  try{ loadAll(); }catch(e){ console.warn('loadAll 오류:', e); }
  try{ loadXLSX(); }catch(e){}

  if(S.supabaseUrl && S.supabaseKey){
    // Supabase 있으면 → 로딩 표시하고 Supabase에서 먼저 로드
    showLoading(true);
    setTimeout(function(){
      try{
        if(initSupabaseClient()){
          sbLoadAll().then(function(loaded){
            showLoading(false);
            if(loaded){
              // patients는 localStorage에 저장 안 함 (5MB 초과 방지)
              // 나머지만 localStorage에 캐시
              ['ledger','employees','schedule','messageLogs','happycalls'].forEach(function(k){
                try{localStorage.setItem('kh365_'+k,JSON.stringify(S[k]));}catch(e){}
              });
            }
            try{ render(); }catch(e){ console.error('render 오류:', e); }
          }).catch(function(e){
            showLoading(false);
            console.warn('Supabase 로드 실패 (로컬 데이터로 실행):', e.message||e);
            try{ render(); }catch(e2){}
          });
        } else {
          showLoading(false);
          try{ render(); }catch(e){}
        }
      }catch(e){
        showLoading(false);
        console.warn('Supabase 연결 실패:', e.message||e);
        try{ render(); }catch(e2){}
      }
    }, 100);
  } else {
    // Supabase 없으면 → 로컬 데이터로 바로 표시
    try{ render(); }catch(e){ console.error('render 오류:', e); }
  }
}
if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",init);
} else { init(); }
</script>
